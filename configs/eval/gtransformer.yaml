method: gtransformer

data:
  wanted_domains: [cancer, hiv, warfarin, mimic]
  raw_inputs:
    pickle_dirs:
      - outputs/data/cancer
      - outputs/data/hiv
      - outputs/data/warfarin
      - outputs/data/mimic

evaluation:
  output_dir: outputs/eval/gtransformer

tuning:
  initial_random_search: 40
  top_k_reuse: 1

baseline:
  limits:
    max_val_origins: 256
    projection_horizon: 5

  default_hparams:
    epochs: 80
    num_layers: 3
    num_heads: 4
    d_model: 96
    br_size: 64
    fc_hidden_units: 64
    dropout: 0.10
    lr: 1.0e-3
    weight_decay: 1.0e-5
    batch_size: 32
    grad_clip: 1.0

  search_space:
    num_layers: [2, 3, 4]
    num_heads: [2, 4]
    d_model: [32, 48, 64, 96, 128]
    br_size: [32, 48, 64, 96, 128]
    fc_hidden_units: [32, 64, 96, 128, 192]
    dropout: [0.1, 0.2, 0.3]
    lr: [1.0e-3, 1.0e-4, 1.0e-5]
    weight_decay: [1.0e-5, 1.0e-4, 1.0e-3]
    batch_size: [16, 32, 64]
