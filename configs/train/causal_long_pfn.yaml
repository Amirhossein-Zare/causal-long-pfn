# CausalLongPFN synthetic pretraining config.

runtime:
  ckpt_input_dir: ""
  output_dir: "./outputs/causal_long_pfn_outputs"

model:
  D_MODEL: 256
  N_HEADS: 8
  N_HISTORY_LAYERS: 4
  N_PFN_LAYERS: 6
  D_FF: 1024
  DROPOUT: 0.1
  GMM_K: 5
  GMM_PI_TEMP: 1.0
  GMM_MIN_SIGMA: 0.02
  GMM_MAX_SIGMA: 2.0

training:
  BATCH_SIZE: 16
  ACCUM_STEPS: 16
  LR: 0.0003
  WEIGHT_DECAY: 0.00001
  WARMUP_STEPS: 400
  MAX_STEPS: 10000
  SCHED_TOTAL_STEPS: 10000
  MIN_LR_SCALE: 0.02
  CHECKPOINT_EVERY: 500
  SESSION_TIMEOUT: 42000
  SEED: 42

prior:
  OBS_TIME_MIN: 3
  OBS_TIME_MAX: 60
  HORIZON_MIN: 1
  HORIZON_MAX: 5
  D_STATE_MIN: 1
  D_STATE_MAX: 10
  N_SUPPORT_MIN: 3
  N_SUPPORT_MAX: 500
  N_SUPPORT_ANCHORS: 4
  OBSERVATIONAL_QUERY_PROB: 0.30
  SUPPORT_LABEL_NOISE_PROB: 0.15
  SUPPORT_FUTURE_COVARIATE_MASK_PROB: 0.35

stability:
  NLL_HUBER_THRESHOLD: 15.0
  NLL_HUBER_SLOPE: 0.01
  MEAN_HUBER_DELTA: 3.0
  MEAN_LOSS_WEIGHT: 0.25
  CONC_PEN_WEIGHT: 0.03
  CONC_PEN_MAX_PI: 0.90
  CLIP_BASE: 0.50
  CLIP_MAX: 1.50
  CLIP_RAMP_STEPS: 4000
